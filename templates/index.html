<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat</title>
    <!-- Phase 1 default: load HTMX from a public CDN with an exact reviewed version pin. -->
    <!-- Forks that change this URL should treat it as a deliberate runtime dependency decision. -->
    <script src="https://unpkg.com/htmx.org@1.9.5"></script>
    <!-- Phase 1 default: keep Tailwind's browser runtime on the public CDN for a no-build-step setup. -->
    <!-- This is an intentional reviewed exception to exact pinning, not an accidental dependency. -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        chat: {
                            50: '#f9fafb',
                            100: '#f3f4f6',
                            200: '#e5e7eb',
                            300: '#d1d5db',
                            400: '#9ca3af',
                            500: '#6b7280',
                            600: '#4b5563',
                            700: '#374151',
                            800: '#1f2937',
                            900: '#111827',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <!-- Main container with responsive padding -->
    <div class="container mx-auto max-w-3xl p-2 sm:p-4 flex-grow flex flex-col h-full">
        <!-- Chat card with fixed layout -->
        <div class="bg-white shadow-lg overflow-hidden flex flex-col h-full">
            <!-- Header - fixed at top -->
            <div class="bg-gray-700 text-white p-3 sm:p-4 flex items-center justify-between flex-shrink-0">
                <h1 class="text-lg sm:text-xl font-bold">Chat with {{ display_name }}</h1>
                <span class="text-xs sm:text-sm bg-gray-600 px-2 py-1">{{ model_display_name }}</span>
            </div>
            
            <!-- Include the chat component - will scroll in the middle -->
            {% include "components/chat.html" %}
        </div>
    </div>

    <script src="/static/js/chat.js"></script>
</body>
</html>
