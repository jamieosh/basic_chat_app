minimum_pre_commit_version: "3.7.0"
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff (lint)
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        types_or: [python]
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest
        entry: uv run python -m pytest
        language: system
        pass_filenames: false
        stages: [pre-push]
